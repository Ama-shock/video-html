services:
  # 静的ファイルサーバー + API プロキシ
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docs:/srv/docs:ro
    depends_on:
      - gateway

  # クレデンシャルバンドルゲートウェイ (wrangler dev でローカル実行)
  # cf-worker/.dev.vars.example をコピーして .dev.vars に鍵を設定してください。
  gateway:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm ci && npx wrangler dev"
    volumes:
      - ./cf-worker:/app
      - gateway_modules:/app/node_modules
      - wrangler_cache:/root/.wrangler
    expose:
      - "3000"

volumes:
  gateway_modules:
  wrangler_cache:
