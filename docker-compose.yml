services:
  # Worker + Static Assets (wrangler dev でローカル実行)
  # フロントエンドビルド → 静的ファイル配信 + API を単一サービスで提供。
  # 初回起動時に VAPID 秘密鍵を自動生成し、ボリュームに永続化。
  app:
    image: node:22-slim
    working_dir: /app
    command: sh entrypoint.sh
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - .:/app
      - app_modules:/app/node_modules
      - app_data:/data
      - wrangler_cache:/root/.wrangler
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s

  # Cloudflare Workers デプロイ
  # 使い方:
  #   docker compose --profile deploy run --rm --service-ports deploy login  # 初回ログイン
  #   docker compose --profile deploy run --rm deploy                        # デプロイ
  #   CLOUDFLARE_API_TOKEN=xxx docker compose --profile deploy run --rm deploy
  deploy:
    image: node:22-slim
    working_dir: /app
    entrypoint: ["sh", "deploy.sh"]
    ports:
      - "8976:8976"   # wrangler login OAuth コールバック用
    volumes:
      - .:/app
      - deploy_modules:/app/node_modules
      - wrangler_cache:/root/.wrangler
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - VAPID_PRIVATE_KEY_D=${VAPID_PRIVATE_KEY_D:-}
    profiles:
      - deploy

  # E2E テスト (ヘッドレス Chromium)
  e2e:
    build:
      context: .
      dockerfile: e2e.Dockerfile
    working_dir: /app
    command: npx playwright test
    volumes:
      - .:/app
      - e2e_modules:/app/node_modules
    depends_on:
      app:
        condition: service_healthy
    environment:
      - BASE_URL=http://app:3000
    profiles:
      - test

volumes:
  app_modules:
  app_data:
  wrangler_cache:
  deploy_modules:
  e2e_modules:
