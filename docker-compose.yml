services:
  # フロントエンドビルド (init container: 完了したら終了)
  build:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm ci && node build.ts"
    volumes:
      - .:/app
      - build_modules:/app/node_modules

  # 静的ファイルサーバー + API プロキシ
  caddy:
    image: caddy:alpine
    ports:
      - "${HOST_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./public:/srv/public:ro
    depends_on:
      build:
        condition: service_completed_successfully

  # クレデンシャルバンドルゲートウェイ (wrangler dev でローカル実行)
  # 初回起動時に VAPID 秘密鍵を自動生成し、ボリュームに永続化します。
  gateway:
    image: node:22-slim
    working_dir: /app
    command: sh /app/entrypoint.sh
    volumes:
      - ./cf-worker:/app
      - gateway_modules:/app/node_modules
      - gateway_data:/data
      - wrangler_cache:/root/.wrangler
    expose:
      - "3000"

  # E2E テスト (ヘッドレス Chromium)
  e2e:
    build:
      context: .
      dockerfile: e2e.Dockerfile
    working_dir: /app
    command: npx playwright test
    volumes:
      - .:/app
      - e2e_modules:/app/node_modules
    depends_on:
      caddy:
        condition: service_started
      gateway:
        condition: service_started
    environment:
      - BASE_URL=http://caddy
    profiles:
      - test

volumes:
  build_modules:
  gateway_modules:
  gateway_data:
  wrangler_cache:
  e2e_modules:
