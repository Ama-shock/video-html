name = "video-html-gateway"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# 本番デプロイ時はドメインに合わせて変更する
ALLOWED_ORIGIN = "http://localhost"
VAPID_SUBJECT = "mailto:admin@example.com"

# Secrets (本番: wrangler secret put <NAME> / ローカル: .dev.vars に記載)
# VAPID_PRIVATE_KEY_D   — P-256 秘密鍵スカラー (base64url, 32 bytes)
# VAPID_PUBLIC_KEY      — P-256 非圧縮公開鍵 (base64url, 65 bytes)
# GATEWAY_KEY_ID        — 8 バイト鍵識別子 (base64url)

[dev]
port = 3000
ip = "0.0.0.0"
